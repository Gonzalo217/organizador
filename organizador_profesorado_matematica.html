// ── Calcula el estado efectivo de una materia dados los estados actuales ──
function calcEstado(m, estados) {
  const e = estados[m.id] || 'no_cursada';
  const isRA = id => ['regular','aprobada'].includes(estados[id]||'no_cursada');
  const isA  = id => (estados[id]||'no_cursada') === 'aprobada';

  if (e === 'aprobada') return 'aprobada';
  if (e === 'cursando') return 'cursando';
  if (e === 'regular')  return m.acreditar.every(isA) ? 'puede_rendir' : 'regular';
  // no_cursada: verificar correlativas
  const puedeC = m.cursarR.every(isRA) && m.cursarA.every(isA);
  return puedeC ? 'puede_cursar' : 'bloqueada';
}

function MateriaCard({ m, estado, es, onUpdate, estados }) {
  const [toast, setToast] = useState(null);
  const cfg = CFG[es];
  const isRA = id => ['regular','aprobada'].includes(estados[id]||'no_cursada');
  const isA  = id => (estados[id]||'no_cursada') === 'aprobada';

  const missingCursar = [
    ...m.cursarR.filter(id => !isRA(id)).map(id => ({ id, t:'regular' })),
    ...m.cursarA.filter(id => !isA(id)).map(id => ({ id, t:'aprobada' })),
  ];
  const missingAcred = m.acreditar.filter(id => !isA(id));

  // ── Reglas de disponibilidad por opción ──
  const puedeCursar   = m.cursarR.every(isRA) && m.cursarA.every(isA);
  const puedeAprobar  = puedeCursar && m.acreditar.every(isA);

  const opciones = [
    {
      v: 'no_cursada',
      label: '⬜ No cursada',
      ok: true,
      motivo: null,
    },
    {
      v: 'cursando',
      label: '📖 Cursando',
      ok: puedeCursar,
      motivo: !puedeCursar
        ? `Necesitás: ${missingCursar.map(x=>`${NOMBRES[x.id]} (${x.t})`).join(', ')}`
        : null,
    },
    {
      v: 'regular',
      label: '📝 Regular',
      ok: puedeCursar,
      motivo: !puedeCursar
        ? `Necesitás: ${missingCursar.map(x=>`${NOMBRES[x.id]} (${x.t})`).join(', ')}`
        : null,
    },
    {
      v: 'aprobada',
      label: '✅ Aprobada',
      ok: puedeAprobar,
      motivo: !puedeCursar
        ? `Para cursar necesitás: ${missingCursar.map(x=>`${NOMBRES[x.id]} (${x.t})`).join(', ')}`
        : missingAcred.length > 0
          ? `Para aprobar el final necesitás: ${missingAcred.map(id=>NOMBRES[id]).join(', ')} aprobada${missingAcred.length>1?'s':''}`
          : null,
    },
  ];

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 3500);
  };

  const handleChange = (val) => {
    const op = opciones.find(o => o.v === val);
    if (!op || !op.ok) {
      if (op?.motivo) showToast(op.motivo);
      return;
    }
    onUpdate(m.id, val);
  };

  return (
    <div style={{
      background:cfg.bg, border:`2px solid ${cfg.border}`, borderRadius:12,
      padding:14, display:'flex', flexDirection:'column', gap:10,
      transition:'transform .15s, box-shadow .15s', position:'relative',
    }}
      onMouseEnter={e=>{ e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 24px rgba(0,0,0,.09)'; }}
      onMouseLeave={e=>{ e.currentTarget.style.transform='none'; e.currentTarget.style.boxShadow='none'; }}
    >
      {/* Toast de error */}
      {toast && (
        <div style={{
          position:'absolute',top:-8,left:8,right:8,zIndex:10,
          background:'#1e293b',color:'white',borderRadius:9,
          padding:'8px 12px',fontSize:11,lineHeight:1.5,
          boxShadow:'0 6px 20px rgba(0,0,0,.25)',
          animation:'fadeIn .2s ease',
        }}>
          🚫 {toast}
        </div>
      )}

      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:13,color:'#0f172a',lineHeight:1.3,marginBottom:3}}>{m.n}</div>
          <div style={{fontSize:11,color:'#64748b',fontWeight:500}}>{m.p}</div>
        </div>
        <Badge bg={cfg.badge}>{cfg.icon} {cfg.label}</Badge>
      </div>

      {es === 'bloqueada' && missingCursar.length > 0 && (
        <div style={{background:'#fee2e2',border:'1px solid #fecaca',borderRadius:8,padding:'7px 10px',
          fontSize:11,color:'#991b1b',lineHeight:1.6}}>
          <strong>Para cursar necesitás:</strong><br/>
          {missingCursar.map((x,i)=>(
            <span key={x.id}>{i>0?', ':''}<em>{NOMBRES[x.id]}</em> ({x.t})</span>
          ))}
        </div>
      )}

      {(es === 'regular' || es === 'cursando') && missingAcred.length > 0 && (
        <div style={{background:'#fef9c3',border:'1px solid #fde68a',borderRadius:8,padding:'7px 10px',
          fontSize:11,color:'#854d0e',lineHeight:1.6}}>
          <strong>Para rendir el final necesitás aprobar:</strong><br/>
          {missingAcred.map((id,i)=><span key={id}>{i>0?', ':''}<em>{NOMBRES[id]}</em></span>)}
        </div>
      )}

      {/* Botones de estado */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5}}>
        {opciones.map(op => {
          const isActive = estado === op.v;
          const isLocked = !op.ok;
          return (
            <button
              key={op.v}
              onClick={() => handleChange(op.v)}
              title={isLocked ? op.motivo : ''}
              style={{
                padding:'6px 4px',
                borderRadius:8,
                border: isActive ? `2px solid ${cfg.badge}` : '1.5px solid #e2e8f0',
                cursor: isLocked ? 'not-allowed' : 'pointer',
                fontSize:11,
                fontWeight: isActive ? 700 : 500,
                fontFamily:'Outfit,sans-serif',
                background: isActive ? cfg.badge : isLocked ? '#f8f8f8' : 'white',
                color: isActive ? 'white' : isLocked ? '#c0c0c0' : '#334155',
                transition:'all .15s',
                display:'flex', alignItems:'center', justifyContent:'center', gap:4,
                position:'relative',
                opacity: isLocked ? 0.55 : 1,
              }}
            >
              {isLocked && <span style={{fontSize:10}}>🔒</span>}
              {op.label}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function App() {
  const [estados, setEstados] = useState({});

  // Cargar desde localStorage
  useEffect(() => {
    try {
      const saved = localStorage.getItem('prof-mat-estados');
      if (saved) setEstados(JSON.parse(saved));
    } catch(e) {}
  }, []);

  const update = (id, val) => {
    setEstados(prev => {
      const next = {...prev, [id]: val};
      try { localStorage.setItem('prof-mat-estados', JSON.stringify(next)); } catch(e) {}
      return next;
    });

  const reset = () => {
    if (!window.confirm('¿Reiniciar todo el progreso? Esta acción no se puede deshacer.')) return;

    puedeCursar: MATERIAS.filter(m => es[m.id]==='puede_cursar').length,

  const progreso = Math.round((cnt.aprobada / MATERIAS.length) * 100);

        const desbloquea = MATERIAS.filter(d =>
          (d.cursarR.includes(m.id)||d.cursarA.includes(m.id)||d.acreditar.includes(m.id)) &&
          ['bloqueada','puede_cursar'].includes(es[d.id])
        ).length;
        return {...m, desbloquea};
      })
      .sort((a,b) => b.desbloquea - a.desbloquea)

            <StatBox n={cnt.enCurso}     label="En curso"    color="#c4b5fd"/>
            <StatBox n={cnt.puedeCursar} label="Habilitadas" color="#93c5fd"/>
            <StatBox n={cnt.puedeRendir} label="P/ Final"    color="#fdba74"/>
            <StatBox n={cnt.bloqueada}   label="Bloqueadas"  color="#f87171"/>
          </div>

          {/* Tabs */}
          <div style={{display:'flex',borderTop:'1px solid rgba(255,255,255,.15)',gap:2}}>
            {[{id:'materias',l:'📚 Plan de Materias'},{id:'plan',l:'⭐ Planificación'}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                flex:1,padding:'12px 8px',border:'none',cursor:'pointer',
                fontSize:13,fontWeight:700,fontFamily:'Outfit,sans-serif',
                background: tab===t.id ? '#f8f7f4' : 'transparent',
                color: tab===t.id ? '#1e293b' : 'rgba(255,255,255,.65)',
                borderRadius: tab===t.id ? '10px 10px 0 0' : 0,
                transition:'all .2s',
              }}>{t.l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* ── CONTENIDO ── */}
      <div style={{maxWidth:980,margin:'0 auto',padding:'20px 16px 40px'}}>

        {/* ══ TAB: MATERIAS ══ */}
        {tab === 'materias' && (
          <div className="fade-in">

            {/* Paneles rápidos */}
            {(proximasCursar.length > 0 || finalesOrdenados.length > 0) && (
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(270px,1fr))',gap:14,marginBottom:18}}>
                {proximasCursar.length > 0 && (
                  <div style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:14,padding:16}}>
                    <div style={{fontWeight:700,color:'#1d4ed8',marginBottom:10,fontSize:13}}>
                      🔵 Podés cursar ahora — {proximasCursar.length} materia{proximasCursar.length!==1?'s':''}
                    </div>
                    {proximasCursar.slice(0,6).map(m=>(
                      <div key={m.id} style={{fontSize:12,color:'#1e40af',marginBottom:4,display:'flex',
                        justifyContent:'space-between',alignItems:'center'}}>
                        <span>• {m.n}</span>
                        <span style={{fontSize:10,color:'#93c5fd'}}>{m.año}°</span>
                      </div>
                    ))}
                    {proximasCursar.length > 6 && (
                      <div style={{fontSize:11,color:'#93c5fd',marginTop:6}}>+{proximasCursar.length-6} más...</div>
                    )}
                  </div>
                )}
                {finalesOrdenados.length > 0 && (
                  <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:14,padding:16}}>
                    <div style={{fontWeight:700,color:'#c2410c',marginBottom:10,fontSize:13}}>
                      🟠 Podés rendir final — {finalesOrdenados.length} materia{finalesOrdenados.length!==1?'s':''}
                    </div>
                    {finalesOrdenados.slice(0,6).map(m=>(
                      <div key={m.id} style={{fontSize:12,color:'#9a3412',marginBottom:4,display:'flex',
                        justifyContent:'space-between',alignItems:'center',gap:6}}>
                        <span>• {m.n}</span>
                        {m.desbloquea>0 && (
                          <span style={{fontSize:10,background:'#fed7aa',padding:'1px 7px',borderRadius:10,flexShrink:0}}>
                            +{m.desbloquea}
                          </span>
                        )}
                      </div>
                    ))}
                    {finalesOrdenados.length > 6 && (
                      <div style={{fontSize:11,color:'#fdba74',marginTop:6}}>+{finalesOrdenados.length-6} más...</div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* Filtros */}
            <div style={{marginBottom:18,display:'flex',flexWrap:'wrap',gap:8}}>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                {[0,1,2,3,4].map(a=>(
                  <FilterBtn key={a} active={año===a} onClick={()=>setAño(a)}>
                    {a===0?'Todos los años':`${a}° Año`}
                  </FilterBtn>
                ))}
              </div>
              <div style={{width:'100%',height:1,background:'#e2e8f0'}}/>
              <div style={{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}}>
                {[
                  {v:'todos',        l:'📋 Todas'},
                  {v:'puede_cursar', l:'🔵 Habilitadas'},
                  {v:'puede_rendir', l:'🟠 P/ Final'},
                  {v:'en_curso',     l:'📚 En curso'},
                  {v:'aprobadas',    l:'✅ Aprobadas'},
                  {v:'bloqueadas',   l:'🔒 Bloqueadas'},
                ].map(f=>(
                  <FilterBtn key={f.v} active={filtro===f.v} onClick={()=>setFiltro(f.v)}>{f.l}</FilterBtn>
                ))}
              </div>
            </div>

            {/* Grilla de materias por año */}
            {byYear.map(({a,ms})=>(
              <div key={a} style={{marginBottom:32}}>
                <div style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:15,color:'#0f172a',
                  marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
                  <div style={{width:34,height:34,background:'#0f172a',borderRadius:9,display:'flex',
                    alignItems:'center',justifyContent:'center',color:'white',fontSize:14,fontWeight:800}}>
                    {a}
                  </div>
                  {AÑO_LABELS[a]}
                  <div style={{flex:1,height:1,background:'#e2e8f0'}}/>
                  <span style={{fontSize:12,color:'#94a3b8',fontFamily:'Outfit,sans-serif',fontWeight:400}}>
                    {ms.length} materia{ms.length!==1?'s':''}
                  </span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:11}}>
                  {ms.map(m=>(
                    <MateriaCard key={m.id} m={m}
                      estado={estados[m.id]||'no_cursada'}
                      es={es[m.id]}
                      onUpdate={update}
                      estados={estados}
                    />
                  ))}
                </div>
              </div>
            ))}

            {byYear.length === 0 && (
              <div style={{textAlign:'center',color:'#94a3b8',padding:'80px 0',fontSize:14}}>
                <div style={{fontSize:42,marginBottom:14}}>🔍</div>
                No hay materias con ese filtro.<br/>
                <span style={{fontSize:12}}>Probá cambiando los filtros de arriba.</span>
              </div>
            )}

            <div style={{textAlign:'center',marginTop:32,paddingTop:24,borderTop:'1px solid #e2e8f0'}}>
              <button onClick={reset} style={{background:'none',border:'1px solid #e2e8f0',
                padding:'8px 22px',borderRadius:9,color:'#94a3b8',cursor:'pointer',
                fontSize:12,fontFamily:'Outfit,sans-serif',transition:'all .15s'}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor='#fca5a5';e.currentTarget.style.color='#dc2626';}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.color='#94a3b8';}}>
                🗑️ Reiniciar todo el progreso
              </button>
            </div>
          </div>
        )}

        {/* ══ TAB: PLANIFICACIÓN ══ */}
        {tab === 'plan' && (
          <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:18}}>

            {/* Finales estratégicos */}
            <div style={{background:'white',borderRadius:16,padding:22,border:'1px solid #e2e8f0',boxShadow:'0 1px 8px rgba(0,0,0,.05)'}}>
              <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#0f172a',margin:'0 0 5px'}}>
                ⭐ Finales estratégicos — rendílos primero
              </h2>
              <p style={{fontSize:12,color:'#64748b',margin:'0 0 18px',lineHeight:1.6}}>
                Materias que tenés en condición de rendir, ordenadas por cuántas asignaturas desbloquean al aprobarlas. Las que tienen mayor impacto aparecen arriba.
              </p>

              {finalesOrdenados.length === 0 ? (
                <div style={{color:'#94a3b8',textAlign:'center',padding:'28px 0',fontSize:13}}>
                  <div style={{fontSize:36,marginBottom:10}}>🎉</div>
                  No tenés finales pendientes disponibles. ¡Excelente!
                </div>
              ) : finalesOrdenados.map((m,i)=>(
                <div key={m.id} style={{display:'flex',alignItems:'center',gap:13,padding:'13px 16px',
                  background: i===0?'#fffbeb' : '#fafafa',
                  border: `1px solid ${i===0?'#fcd34d':i<3?'#f1f5f9':'#f1f5f9'}`,
                  borderRadius:11,marginBottom:7,transition:'box-shadow .15s'}}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 14px rgba(0,0,0,.07)'}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow='none'}>
                  <div style={{fontSize:i<3?22:14,width:30,textAlign:'center',flexShrink:0,fontFamily:'Syne,sans-serif',fontWeight:700,color:'#94a3b8'}}>
                    {i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`}
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:'#0f172a',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{m.n}</div>
                    <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>{m.año}° Año · {m.p}</div>
                  </div>
                  <div style={{flexShrink:0}}>
                    {m.desbloquea > 0 ? (
                      <span style={{background:'#fef3c7',color:'#92400e',fontSize:11,fontWeight:700,padding:'4px 12px',borderRadius:20}}>
                        Desbloquea {m.desbloquea}
                      </span>
                    ) : (
                      <span style={{color:'#cbd5e1',fontSize:11}}>Sin desbloqueos</span>
                    )}
                  </div>
                </div>
              ))}
            </div>

            {/* Materias habilitadas para cursar */}
            <div style={{background:'white',borderRadius:16,padding:22,border:'1px solid #e2e8f0',boxShadow:'0 1px 8px rgba(0,0,0,.05)'}}>
              <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#0f172a',margin:'0 0 5px'}}>
                🔵 Materias habilitadas para cursar
              </h2>
              <p style={{fontSize:12,color:'#64748b',margin:'0 0 18px',lineHeight:1.6}}>
                Tenés todas las correlativas necesarias para inscribirte en estas materias.
              </p>

              {proximasCursar.length === 0 ? (
                <div style={{color:'#94a3b8',textAlign:'center',padding:'28px 0',fontSize:13}}>
                  <div style={{fontSize:36,marginBottom:10}}>📋</div>
                  No hay materias habilitadas todavía.<br/>
                  <span style={{fontSize:11}}>Regularizá o aprobá más materias para desbloquearlas.</span>
                </div>
              ) : [1,2,3,4].map(a => {
                const ms = proximasCursar.filter(m=>m.año===a);
                if (!ms.length) return null;
                return (
                  <div key={a} style={{marginBottom:16}}>
                    <div style={{fontWeight:700,fontSize:11,color:'#475569',marginBottom:9,
                      textTransform:'uppercase',letterSpacing:'.7px'}}>
                      {AÑO_LABELS[a]}
                    </div>
                    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(215px,1fr))',gap:9}}>
                      {ms.map(m=>(
                        <div key={m.id} style={{background:'#eff6ff',border:'1px solid #bfdbfe',borderRadius:10,padding:'10px 13px',
                          transition:'transform .15s'}}
                          onMouseEnter={e=>e.currentTarget.style.transform='translateY(-1px)'}
                          onMouseLeave={e=>e.currentTarget.style.transform='none'}>
                          <div style={{fontWeight:700,fontSize:12,color:'#1e40af',lineHeight:1.35}}>{m.n}</div>
                          <div style={{fontSize:11,color:'#93c5fd',marginTop:4}}>{m.p}</div>
                        </div>
                      ))}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Leyenda */}
            <div style={{background:'white',borderRadius:16,padding:22,border:'1px solid #e2e8f0',boxShadow:'0 1px 8px rgba(0,0,0,.05)'}}>
              <h2 style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:17,color:'#0f172a',margin:'0 0 16px'}}>
                📋 Leyenda de estados
              </h2>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(185px,1fr))',gap:9}}>
                {Object.entries(CFG).map(([k,v])=>(
                  <div key={k} style={{display:'flex',alignItems:'center',gap:9,padding:'9px 13px',
                    background:v.bg,border:`2px solid ${v.border}`,borderRadius:10}}>
                    <span style={{fontSize:15}}>{v.icon}</span>
                    <span style={{fontSize:12,fontWeight:700,color:'#334155'}}>{v.label}</span>
                  </div>
                ))}
              </div>
              <div style={{marginTop:16,background:'#f8f7f4',borderRadius:10,padding:14,fontSize:12,color:'#64748b',lineHeight:1.8}}>
                <strong style={{color:'#334155',display:'block',marginBottom:4}}>📌 Lógica de correlatividades:</strong>
                • <strong>Para cursar</strong> una materia: las correlativas marcadas como "R" deben estar en estado <em>Regular</em> o <em>Aprobada</em>. Las marcadas como "A" deben estar <em>Aprobadas</em>.<br/>
                • <strong>Para rendir el final</strong>: la materia debe estar en estado <em>Regular</em> y las correlativas para acreditar deben estar <em>Aprobadas</em>.<br/>
                • El progreso se guarda automáticamente en tu navegador (localStorage).
              </div>
            </div>

          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
